    <style>
        * {

            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
            position: relative;
        }
        /* ব্যাকগ্রাউন্ড ব্লার ইফেক্ট */
        .bg-blur {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), 
                        url('https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1000') no-repeat center center/cover;
            filter: blur(8px);
            z-index: -1;
            transform: scale(1.1);
        }
        .verification-box {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.6s ease-out;
            position: relative;
            z-index: 10; /* পুরো বক্সের লেয়ার ওপরে রাখা হলো */
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .avatar-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid #ec4899;
            object-fit: cover;
        }
        .online-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 18px;
            height: 18px;
            background: #22c55e;
            border-radius: 50%;
            border: 3px solid #1e293b;
        }
        h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ffffff;
            font-weight: 700;
        }
        p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 20; /* বাটন কন্টেইনারের লেয়ার আরও ওপরে করা হলো যাতে ব্যাকগ্রাউন্ড অ্যাড বাধা না দেয় */
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            z-index: 25; /* সরাসরি বাটনের ক্লিক পাওয়ার নিশ্চিত করা হলো */
        }
        .btn-primary {
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.6);
        }
        .btn-secondary {
            background: transparent;
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
        }
        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
